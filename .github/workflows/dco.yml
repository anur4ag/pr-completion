# Enforce Developer Certificate of Origin with author/committer identity match.
# Historical exception (immutable, do not rewrite): a93a5d7, 4af89ae only.
name: dco

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: signed-off-by
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify Signed-off-by matches author or committer
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            range="${BASE}..${HEAD}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ] \
              && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              range="${BEFORE}..${AFTER}"
            else
              range="${AFTER}^!"
            fi
          fi
          echo "Checking DCO for range: ${range}"
          python -B scripts/check-dco.py --range "${range}"
