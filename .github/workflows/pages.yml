# Build, link-check, and deploy the documentation site to GitHub Pages.
#
# This workflow intentionally does not create remotes, tags, or releases.
name: pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "LICENSE"
      - "VERSION"
      - ".claude-plugin/plugin.json"
      - ".codex-plugin/plugin.json"
      - "scripts/build-docs.py"
      - "scripts/check-docs-links.py"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "LICENSE"
      - "VERSION"
      - ".claude-plugin/plugin.json"
      - ".codex-plugin/plugin.json"
      - "scripts/build-docs.py"
      - "scripts/check-docs-links.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege defaults; each job re-declares only what it needs.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build documentation site
        run: python3 scripts/build-docs.py --out docs/_site

      - name: Link-check documentation (internal + bounded external HTTP)
        run: python3 scripts/check-docs-links.py --site-dir docs/_site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
