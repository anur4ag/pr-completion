# Independent exact-byte integrity gate for the immutable published v0.1.1
# plugin ZIP. This job cannot pass via content-fingerprint equivalence alone.
name: release-integrity

on:
  # Always on main so the exact-byte pin cannot drift unnoticed.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  published-zip-bytes:
    name: published-zip-bytes
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download immutable v0.1.1 release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v011-assets
          gh release download v0.1.1 \
            --repo "${{ github.repository }}" \
            --dir /tmp/v011-assets \
            --pattern 'pr-completion-0.1.1-plugin.zip' \
            --pattern 'SHA256SUMS.txt'
          ls -la /tmp/v011-assets

      - name: Exact-byte integrity against RELEASE_PLUGIN_SHA256
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          import re
          from pathlib import Path

          root = Path(".").resolve()
          script = root / "scripts/package-openai-submission.py"
          spec = importlib.util.spec_from_file_location("portal_pkg", script)
          mod = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(mod)

          expected = mod.RELEASE_PLUGIN_SHA256
          assert expected and len(expected) == 64, "RELEASE_PLUGIN_SHA256 must be pinned"

          sums = Path("/tmp/v011-assets/SHA256SUMS.txt").read_text(encoding="utf-8")
          match = re.search(
              r"^([0-9a-f]{64})\s+pr-completion-0\.1\.1-plugin\.zip\s*$",
              sums,
              re.MULTILINE,
          )
          assert match, "SHA256SUMS.txt missing plugin.zip line"
          assert match.group(1) == expected, (
              f"SHA256SUMS plugin digest {match.group(1)} != pin {expected}"
          )

          zip_path = Path("/tmp/v011-assets/pr-completion-0.1.1-plugin.zip")
          # Independent exact-byte gate: content pin alone cannot satisfy this.
          digest = mod.verify_published_zip_bytes(zip_path)
          assert digest == expected
          print(f"exact-byte OK: {digest}")
          print(f"content pin (portable): {mod.RELEASE_PLUGIN_CONTENT_SHA256}")
          PY
